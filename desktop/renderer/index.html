<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Anton Egon - Desktop App</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #0f0f0f;
            color: #ffffff;
            height: 100vh;
            overflow: hidden;
        }
        #loading {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            gap: 20px;
        }
        .spinner {
            width: 50px;
            height: 50px;
            border: 3px solid #333;
            border-top-color: #3b82f6;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        #app-frame {
            width: 100%;
            height: 100%;
            border: none;
            display: none;
        }
        .error {
            color: #ef4444;
            text-align: center;
            max-width: 400px;
            padding: 20px;
        }
        .error button {
            margin-top: 15px;
            padding: 10px 20px;
            background: #3b82f6;
            color: white;
            border: none;
            border-radius: 6px;
            cursor: pointer;
        }
    </style>
</head>
<body>
    <div id="loading">
        <div class="spinner"></div>
        <div>Starting Anton Egon...</div>
        <div style="font-size: 0.85em; color: #666;">Spawning Python backend</div>
    </div>
    <div id="error" class="error" style="display: none;">
        <h2>Backend Failed to Start</h2>
        <p>Could not connect to the Python backend. Please check your Python installation.</p>
        <button onclick="location.reload()">Retry</button>
    </div>
    <iframe id="app-frame" sandbox="allow-scripts allow-same-origin allow-forms allow-popups"></iframe>

    <script>
        const BACKEND_URL = 'http://127.0.0.1:8000';
        const MAX_RETRIES = 30;
        let retryCount = 0;

        async function checkBackend() {
            try {
                const response = await fetch(`${BACKEND_URL}/api/status`, { 
                    method: 'GET',
                    signal: AbortSignal.timeout(2000)
                });
                if (response.ok) {
                    loadDashboard();
                    return true;
                }
            } catch (err) {
                console.log('Backend not ready yet...', err);
            }
            return false;
        }

        function loadDashboard() {
            document.getElementById('loading').style.display = 'none';
            document.getElementById('error').style.display = 'none';
            const frame = document.getElementById('app-frame');
            frame.style.display = 'block';
            frame.src = BACKEND_URL;
        }

        function showError() {
            document.getElementById('loading').style.display = 'none';
            document.getElementById('error').style.display = 'block';
        }

        async function pollBackend() {
            const ready = await checkBackend();
            if (ready) return;

            retryCount++;
            if (retryCount >= MAX_RETRIES) {
                showError();
                return;
            }

            setTimeout(pollBackend, 1000);
        }

        // Start polling
        pollBackend();
    </script>
</body>
</html>
